name: Update profile art

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write

jobs:
  update-art:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          
      - name: Update contribution graph
        env:
          GH_PROFILE_USER: Yash13606
        run: |
          python scripts/fetch_contributions.py
          python scripts/render_heatmap_svg.py
          
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update profile art [skip ci]" && git push)
